name: CI Pipeline

on: 
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

  jobs:
    buid:
    runs-on: ubuntu-latest

    steps:
    -name: checkout code
    uses: actions/checkout@v4

    -name: Set up node.js
    uses: actions/setup-node@v4
    with:
    node-version: '20'
    
    -name: install dependencies
    run: npm install

    -name: run tests
    run: npm test
    

    

